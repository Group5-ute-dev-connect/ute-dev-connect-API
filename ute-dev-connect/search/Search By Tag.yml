info:
  name: Search By Tag
  type: http
  seq: 2

http:
  method: GET
  url: http://localhost:5000/api/search?type=posts&tag=nodejs

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Search By Tag - 200 (tag=nodejs)
    request:
      url: http://localhost:5000/api/search?type=posts&tag=nodejs&page=1&limit=10
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "success": true,
            "type": "posts",
            "keyword": "",
