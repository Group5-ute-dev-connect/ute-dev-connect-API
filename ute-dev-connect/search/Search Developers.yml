info:
  name: Search Developers
  type: http
  seq: 4

http:
  method: GET
  url: http://localhost:5000/api/search?type=developers&q=nguyen&skill=react

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Search Developers - 200 (Theo tên + skill)
    request:
      url: http://localhost:5000/api/search?type=developers&q=nguyen&skill=react&page=1&limit=10
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "success": true,
            "type": "developers",
            "keyword": "nguyen",
            "skill": "react",
