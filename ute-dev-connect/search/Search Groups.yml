info:
  name: Search Groups
  type: http
  seq: 3

http:
  method: GET
  url: http://localhost:5000/api/search?type=groups&q=web

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Search Groups - 200
    request:
      url: http://localhost:5000/api/search?type=groups&q=react&page=1&limit=10
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "success": true,
            "type": "groups",
            "keyword": "react",
            "data": [
              {
                "_id": "6b1234567890abcdef123456",
                "name": "Nhóm React & Frontend",
