info:
  name: Search Posts (Full-text)
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:5000/api/search?type=posts&q=react

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
