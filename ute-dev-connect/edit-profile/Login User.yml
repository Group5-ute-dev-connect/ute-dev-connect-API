http:
  method: POST
  url: http://localhost:5000/api/auth/login
  body:
    type: json
    data: "{\r

      \    \"email\": \"23110219@student.hcmute.edu.vn\",\r

      \    \"password\": \"123456\"\r

      }\r\n"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        var jsonData = res.getBody();
        pm.collectionVariables.set("token", jsonData.token);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

