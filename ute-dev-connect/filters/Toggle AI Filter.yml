info:
  name: Toggle AI Filter
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:5000/api/filters/ai
  headers:
    - name: Content-Type
      value: application/json
  auth:
    type: bearer
    token: "{{token}}"
  body:
    type: json
    data: |-
      {
        "enabled": true
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
