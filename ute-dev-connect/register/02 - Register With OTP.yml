      url: http://localhost:5000/api/auth/resend-register-otp
      method: POST
      body:
        type: json
        data: "{\r

          \  \"name\": \"Huynh Ngoc Tai\",\r

          \  \"email\": \"huynhngoctai205@gmail.com\",\r

          \  \"studentId\": \"23110305OTP01\",\r

          \  \"password\": \"12345678a\"\r

          }"
    response:
      status: 200
      statusText: OK
      headers:
        - name: X-Powered-By
          value: Express
        - name: RateLimit-Policy
          value: 3;w=900
        - name: RateLimit-Limit
          value: "3"
        - name: RateLimit-Remaining
          value: "2"
        - name: RateLimit-Reset
          value: "900"
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Content-Length
          value: "99"
