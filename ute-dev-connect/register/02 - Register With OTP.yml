info:
  name: 02 - Register With OTP
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:5000/api/auth/resend-register-otp
  body:
    type: json
    data: "{\r

      \  \"name\": \"Huynh Ngoc Tai\",\r

      \  \"email\": \"huynhngoctai205@gmail.com\",\r

      \  \"studentId\": \"23110305OTP01\",\r

      \  \"password\": \"12345678a\"\r

      }"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "{\r

        \  \"name\": \"Huynh Ngoc Tai\",\r

        \  \"email\": \"tai.register.success01@example.com\",\r

        \  \"studentId\": \"23110305SUCCESS01\",\r

        \  \"password\": \"12345678a\"\r

        }"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
