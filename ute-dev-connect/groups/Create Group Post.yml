  - name: Create Group Post - 403 (Không phải thành viên)
    request:
      url: http://localhost:5000/api/groups/6b1234567890abcdef123456/posts
      method: POST
      body:
        type: json
        data: |-
          {
            "text": "Tôi muốn đăng bài nhưng không phải thành viên"
          }
    response:
      status: 403
      statusText: Forbidden
      body:
        type: json
        data: |-
          {
            "success": false,
            "message": "Bạn cần là thành viên của nhóm để thực hiện hành động này"
          }
