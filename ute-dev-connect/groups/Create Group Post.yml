info:
  name: Create Group Post
  type: http
  seq: 8

http:
  method: POST
  url: http://localhost:5000/api/groups/6a23b462e7e9becfb30e9c41/posts
  body:
    type: json
    data: |-
      {
        "text": "Mọi người có ai dùng React Query chưa? Mình đang tìm hiểu về caching strategy với #react #reactquery"
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
