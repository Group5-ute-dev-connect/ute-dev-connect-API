    request:
      url: http://localhost:5000/api/groups/6b1234567890abcdef123456/posts
      method: POST
      body:
        type: json
        data: |-
          {
            "text": "Mọi người có ai dùng React Query chưa? Mình đang tìm hiểu về caching strategy với #react #reactquery"
          }
    response:
      status: 201
      statusText: Created
      body:
        type: json
        data: |-
          {
            "success": true,
            "message": "Đăng bài trong nhóm thành công",
            "data": {
              "_id": "6b2345678901abcdef234567",
              "user": "6a0097ab779909396484a6cc",
