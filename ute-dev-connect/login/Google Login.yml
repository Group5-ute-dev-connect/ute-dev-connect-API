info:
  name: Google Login
  type: http
  seq: 3

http:
  method: POST
  url: http://localhost:5000/api/auth/google
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "idToken": "google_oauth_id_token_here"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
