  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:5000/api/auth/reset-password
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "email": "23110219@student.hcmute.edu.vn",
          "otp": "301722", // Thay bằng 6 số nhận được trong email
          "newPassword": "123456"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

