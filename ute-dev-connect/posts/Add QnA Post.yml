info:
  name: Add QnA Post
  type: http
  seq: 9

http:
  method: POST
  url: http://localhost:5000/api/posts
  body:
    type: json
    data: |-
      {
        "text": "Đây là một câu hỏi Q&A được test qua Bruno",
        "isQuestion": true
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
